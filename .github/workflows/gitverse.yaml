name: Sync to GitVerse

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Mirror"
          git config --global user.email "mirror@github.com"

      - name: Push to GitVerse
        env:
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
        run: |
          GITVERSE_REPO="https://${GITVERSE_TOKEN}@gitverse.ru/fallendimmterius/validate.git"
          git remote remove gitverse 2>/dev/null || true
          git remote add gitverse $GITVERSE_REPO
          # Отправляем все ветки и теги, не пытаясь удалять старые
          git push --force --all gitverse
          git push --force --tags gitverse