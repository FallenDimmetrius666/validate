name: Sync All Branches to GitFlic

on:
  push:
    
    branches:
      - '**'
    tags:
      - '**'

jobs:
  gitflic-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Push to GitFlic
        run: |
               - name: Push to GitFlic
        env:
          # Кодируем логин и токен в base64 для заголовка
          AUTH_HEADER: ${{ secrets.GITFLIC_TOKEN }}
        run: |
          git remote add gitflic https://gitflic.ru
          
          # Настраиваем авторизацию через заголовок (надёжнее, чем в URL)
          # Используем ваш логин fallendimmetrius и токен
          git config http.https://gitflic.ru "Authorization: Basic $(echo -n 'fallendimmetrius:${{ secrets.GITFLIC_TOKEN }}' | base64)"
          
          git push --force --all gitflic
          git push --force --tags gitflic
